<!DOCTYPE html>
<html lang="en">
<head>

    <title>Open Telegram App Automatically</title>
</head>
<body>
    <h1>Opening Telegram...</h1>
    <p>If the Telegram app does not open automatically, <a href="tg://proxy?server=49.13.145.61&port=443&secret=3QAAAAAAAAAAAAAAAAAAAAA=">click here</a>.</p>

    <script>
        // Function to open the Telegram app automatically
        function openTelegram() {
            var checkApp = document.createElement('iframe');
            checkApp.style.display = 'none';
            checkApp.src = "tg://proxy?server=49.13.145.61&port=443&secret=3QAAAAAAAAAAAAAAAAAAAAA=";
            document.body.appendChild(checkApp);

            // Fallback to the web version of Telegram if the app does not open
            setTimeout(function () {
                window.location.href = 'tg://proxy?server=49.13.145.61&port=443&secret=3QAAAAAAAAAAAAAAAAAAAAA=';
                document.body.removeChild(checkApp);
            }, 500);
        }

        // Automatically open Telegram app on page load
        window.onload = openTelegram;
    </script>
</body>
