<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Telegram Link</title>
    <script>
        function openTelegramLink() {
            // Replace with your Telegram link
            const telegramLink = "https://t.me/vpnwb";
            window.location.href = telegramLink;
        }

        // Automatically open the Telegram link when the page loads
        window.onload = openTelegramLink;
    </script>
</head>
<body>
    <h1>Redirecting to Telegram...</h1>
    <p>If you are not redirected automatically, <a id="telegramLink" href="https://t.me/your_telegram_channel">click here</a>.</p>
</body>
</html>
